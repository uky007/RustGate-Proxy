name: Bug report
description: Report a reproducible bug or regression
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail to reproduce the issue.

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Provide exact steps.
      placeholder: |
        1. Run `...`
        2. Send request `...`
        3. Observe `...`
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      placeholder: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs/output
      description: Paste logs, stack traces, or command output.
      render: shell

  - type: textarea
    id: environment
    attributes:
      label: Environment
      placeholder: |
        - OS: macOS 14 / Ubuntu 24.04 / ...
        - Rust: rustc 1.xx
        - rustgate-proxy: 0.1.x
        - Mode: passthrough / mitm
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Any extra details, related PRs/issues, or reproduction repo.
